# Stub params. Fill in from nav2_bringup's params/nav2_params.yaml template
# (controller_server, planner_server, bt_navigator, costmap layers, etc.)
# once the robot's footprint, sensors, and speed limits are known.
controller_server:
  ros__parameters:
    use_sim_time: false

    controller_frequency: 10.0

    odom_topic: /odom
    cmd_vel_topic: /cmd_vel

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001


planner_server:
  ros__parameters:
    use_sim_time: false

    expected_planner_frequency: 1.0
